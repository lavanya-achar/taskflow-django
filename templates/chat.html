{% extends "base.html" %}
{% load static %}

{% block title %}Chat - TaskFlow{% endblock %}
{% block breadcrumb %}Chat{% endblock %}

{% block content %}

<div class="page" id="chat">
  <div class="page-header">
    <div class="page-title">◈ Chat</div>
    <div class="page-subtitle" id="chat-subtitle">Loading...</div>
  </div>
  <div style="display:grid;grid-template-columns:240px 1fr;gap:16px;height:calc(100vh - 180px)">

    <div class="card" style="overflow-y:auto">
      <div class="card-header">
        <div class="card-title">Messages</div>
        <button class="btn btn-ghost btn-sm" onclick="loadRooms()">⟳</button>
      </div>
      <div id="rooms-container" style="padding:8px">
        <div style="text-align:center;padding:20px;color:var(--text3)">Loading rooms...</div>
        <div class="room-item" onclick="openNewMessageModal()">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          New Message
        </div>
      </div>
    </div>


    <div class="card" style="display:flex;flex-direction:column" id="main-chat-area" >
      <div class="card-header" id="room-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:18px" id="room-icon">#</div>
          <div>
            <div class="card-title" style="margin:0" id="room-name">Select a room</div>
            <div class="text-xs text-muted" id="room-members">0 members</div>
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm">📎</button>
          <button class="btn btn-ghost btn-sm">🔍</button>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages" style="flex:1;overflow-y:auto">
        <div style="text-align:center;padding:40px;color:var(--text3)">Select a room to start chatting</div>
      </div>
      <div class="chat-input-area">
        <input class="chat-input" type="text" id="chat-main-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendChatMsg(); }">
        <button class="btn btn-ghost btn-sm">📎</button>
        <button class="btn btn-ghost btn-sm">😀</button>
        <button class="btn btn-primary btn-sm" onclick="sendChatMsg()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>

let currentRoomId = null;


function loadRooms() {
  fetch('/chat/api/rooms/')
    .then(response => response.json())
    .then(data => {
      const container = document.getElementById('rooms-container');
      if (data.rooms.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)">No chats yet. Start a conversation!</div>';
        return;
      }
      
      container.innerHTML = data.rooms.map(room => `
        <div class="room-item ${room.unread_count > 0 ? 'has-unread' : ''}" data-room-id="${room.id}" onclick="loadRoom(${room.id}, '${room.name.replace(/'/g, "\\'")}')">
          <div style="display:flex;justify-content:space-between;align-items:center;width:100%">
            <div style="font-weight:500;font-size:13px">${room.name}</div>
            <div style="font-size:11px;color:var(--text3)">${room.participant_count || 0} members</div>
            ${room.unread_count > 0 ? `<span class="nav-badge">${room.unread_count}</span>` : ''}
          </div>
        </div>
      `).join('');
      
// container.innerHTML += `
//   <div class="divider" style="margin:12px 0"></div>
//   <div class="room-item new-dm-btn" onclick="openNewMessageModal()">
//     <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
//     New Message
//   </div>
// `;
function openNewMessageModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay open';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">New Direct Message</div>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <input type="text" id="dm-search" placeholder="Search team members..." class="form-input" oninput="searchUsers(this.value)">
        </div>
        <div id="user-list" style="max-height: 300px; overflow-y: auto;"></div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  document.body.classList.add('modal-open');
}

function searchUsers(query) {
  if (query.length < 2) {
    document.getElementById('user-list').innerHTML = '';
    return;
  }
  fetch('/chat/api/search-users/?q=' + encodeURIComponent(query))
    .then(response => response.json())
    .then(data => {
      document.getElementById('user-list').innerHTML = data.users.map(user => `
        <div class="dropdown-item" onclick="createPrivateChat(${user.id}, '${user.name.replace(/'/g, "\\'")}', this.closest('.modal-overlay'))">
          <div class="user-avatar" style="width:24px;height:24px;font-size:11px">${user.initials}</div>
          ${user.name}
          <span style="opacity:0.6;font-size:12px">${user.role || 'Member'}</span>
        </div>
      `).join('');
    });
}

function createPrivateChat(userId, userName, modal) {
  fetch('/chat/api/private/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': getCookie('csrftoken')
    },
    body: JSON.stringify({user_id: userId})
  })
  .then(response => response.json())
  .then(data => {
    modal.remove();
    loadRooms();
    setTimeout(() => {
      const roomItem = document.querySelector(`[data-room-id="${data.room_id}"]`);
      if (roomItem) roomItem.click();
    }, 200);
  });
}
    })
    .catch(error => console.error('Error loading rooms:', error));
}


function loadRoom(roomId, roomName) {
  currentRoomId = roomId;
  document.querySelectorAll('.room-item').forEach(item => item.classList.remove('active'));
  event.currentTarget.classList.add('active');
  
  document.getElementById('main-chat-area').style.display = 'flex';
  document.getElementById('room-name').textContent = roomName;
  document.getElementById('chat-messages').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)">Loading messages...</div>';
  
  loadMessages(roomId);
  

  setTimeout(() => {
    const messages = document.getElementById('chat-messages');
    messages.scrollTop = messages.scrollHeight;
  }, 100);
}

function loadMessages(roomId) {
  fetch(`/chat/api/messages/${roomId}/`)
    .then(response => response.json())
    .then(data => {
      const container = document.getElementById('chat-messages');
      container.innerHTML = data.messages.map(msg => {
        const msgClass = msg.is_me ? 'me' : 'other';
        const bubbleClass = msg.is_me ? 'me' : 'other';
        const senderColor = msg.is_me ? '' : `background:linear-gradient(135deg,#${Math.floor(Math.random()*16777215).toString(16)},#${Math.floor(Math.random()*16777215).toString(16)})`;
        
        return `
          <div class="chat-msg ${msgClass}">
            <div class="user-avatar" style="flex-shrink:0;${senderColor}">${msg.sender_avatar}</div>
            <div>
              <div class="chat-sender">${msg.sender} · ${msg.time_str}</div>
              <div class="chat-bubble ${bubbleClass}">${msg.content}</div>
            </div>
          </div>
        `;
      }).join('');

      container.scrollTop = container.scrollHeight;
    });
}

function sendChatMsg() {
  if (!currentRoomId) return;
  
  const input = document.getElementById('chat-main-input');
  const msg = input.value.trim();
  if (!msg) return;
  
  fetch(`/chat/api/messages/${currentRoomId}/`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': getCookie('csrftoken')
    },
    body: JSON.stringify({content: msg})
  })
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById('chat-messages');
    const msgEl = document.createElement('div');
    msgEl.className = 'chat-msg me';
    msgEl.innerHTML = `
      <div>
        <div class="chat-bubble me">${escapeHtml(msg)}</div>
        <div class="chat-time">Just now</div>
      </div>
      <div class="user-avatar" style="flex-shrink:0">${data.sender_avatar}</div>
    `;
    container.appendChild(msgEl);
    container.scrollTop = container.scrollHeight;
    input.value = '';
    
    setTimeout(() => {
      loadMessages(currentRoomId); 
    }, 1000);
  })
  .catch(error => {
    console.error('Error sending message:', error);
    alert('Failed to send message');
  });
}


document.addEventListener('DOMContentLoaded', function() {
  loadRooms();
});

function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '<',
    '>': '>',
    '"': '"',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}
</script>
{% endblock %}
